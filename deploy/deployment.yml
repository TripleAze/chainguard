apiVersion: v1
kind: Namespace
metadata:
  name: chainguard-app
  labels:
    app.kubernetes.io/managed-by: argocd

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: razz-bug-calenderapp
  namespace: chainguard-app
  labels:
    app: razz-bug-calenderapp
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: razz-bug-calenderapp
  template:
    metadata:
      labels:
        app: razz-bug-calenderapp
    spec:
      containers:
        - name: razz-bug-calenderapp
          # CI job 6 (update-manifest) pins this to an exact digest after every build.
          # ArgoCD syncs when this value changes.
          # The digest matches exactly what was signed, scanned, and attested in CI.
          image: ghcr.io/tripleaze/chainguard@sha256:4d37b18ef696ac1e232a61505e0475a6534426056a64cc14a8513f9dab155820
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
