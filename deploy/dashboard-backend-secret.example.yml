---
apiVersion: v1
kind: Secret
metadata:
  name: dashboard-backend-secret
  namespace: chainguard-app
type: Opaque
stringData:
  DATABASE_URL: "postgresql://chainguard:password@dashboard-db:5432/chainguard?sslmode=disable"
  DASHBOARD_INGEST_KEY: "your-ingest-key-here"
  GITHUB_CLIENT_ID: "your-github-client-id-here"
  GITHUB_CLIENT_SECRET: "your-github-client-secret-here"
  SESSION_KEY: "your-session-key-here"
  GITHUB_ALLOWED_USERS: "your-github-username"
