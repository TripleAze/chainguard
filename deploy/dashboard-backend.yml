apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-backend-config
data:
  PORT: "8080"
  GITHUB_CALLBACK_URL: "http://localhost:8080/api/auth/callback"
---
apiVersion: v1
kind: Secret
metadata:
  name: dashboard-backend-secret
type: Opaque
stringData:
  DATABASE_URL: "postgresql://chainguard:chainguard@dashboard-db:5432/chainguard"
  DASHBOARD_INGEST_KEY: "test-ingest-key-12345"
  GITHUB_CLIENT_ID: ""  # Replace with your client ID
  GITHUB_CLIENT_SECRET: ""  # Replace with your client secret
  SESSION_KEY: "your-super-secret-session-key-change-in-production"
  GITHUB_ALLOWED_USERS: "TripleAze" 
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dashboard-backend
  template:
    metadata:
      labels:
        app: dashboard-backend
    spec:
      containers:
      - name: backend
        # Replace with your actual image repository/tag
        image: dashboard-backend:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: dashboard-backend-config
              key: PORT
        - name: GITHUB_CALLBACK_URL
          valueFrom:
            configMapKeyRef:
              name: dashboard-backend-config
              key: GITHUB_CALLBACK_URL
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: dashboard-backend-secret
              key: DATABASE_URL
        - name: DASHBOARD_INGEST_KEY
          valueFrom:
            secretKeyRef:
              name: dashboard-backend-secret
              key: DASHBOARD_INGEST_KEY
        - name: GITHUB_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: dashboard-backend-secret
              key: GITHUB_CLIENT_ID
        - name: GITHUB_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: dashboard-backend-secret
              key: GITHUB_CLIENT_SECRET
        - name: SESSION_KEY
          valueFrom:
            secretKeyRef:
              name: dashboard-backend-secret
              key: SESSION_KEY
        - name: GITHUB_ALLOWED_USERS
          valueFrom:
            secretKeyRef:
              name: dashboard-backend-secret
              key: GITHUB_ALLOWED_USERS
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-backend
spec:
  selector:
    app: dashboard-backend
  ports:
  - port: 8080
    targetPort: http
  type: ClusterIP
