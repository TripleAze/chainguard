---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-backend-config
  namespace: chainguard-app
data:
  PORT: "8080"
  GITHUB_CALLBACK_URL: "https://atiqabubakar.sbs/api/auth/callback"
  FRONTEND_URL: "https://atiqabubakar.sbs"
  SESSION_DOMAIN: ".atiqabubakar.sbs"
  SECURE_COOKIES: "true"
spec:
  template:
    spec:
      containers:
        - image: ghcr.io/tripleaze/chainguard-dashboard-backend:main
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-backend
  namespace: chainguard-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-backend
  template:
    metadata:
      labels:
        app: dashboard-backend
    spec:
      initContainers:
        - name: create-migrations-dir
          image: alpine:latest
          command: ["mkdir", "-p", "/db/migrations"]
          volumeMounts:
            - name: migrations
              mountPath: /db
      containers:
        - name: backend
          image: ghcr.io/tripleaze/chainguard-dashboard-backend:main
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: dashboard-backend-config
                  key: PORT
            - name: GITHUB_CALLBACK_URL
              valueFrom:
                configMapKeyRef:
                  name: dashboard-backend-config
                  key: GITHUB_CALLBACK_URL
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: dashboard-backend-config
                  key: FRONTEND_URL
            - name: SESSION_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: dashboard-backend-config
                  key: SESSION_DOMAIN
            - name: SECURE_COOKIES
              valueFrom:
                configMapKeyRef:
                  name: dashboard-backend-config
                  key: SECURE_COOKIES
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dashboard-backend-secret
                  key: DATABASE_URL
            - name: DASHBOARD_INGEST_KEY
              valueFrom:
                secretKeyRef:
                  name: dashboard-backend-secret
                  key: DASHBOARD_INGEST_KEY
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: dashboard-backend-secret
                  key: GITHUB_CLIENT_ID
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: dashboard-backend-secret
                  key: GITHUB_CLIENT_SECRET
            - name: SESSION_KEY
              valueFrom:
                secretKeyRef:
                  name: dashboard-backend-secret
                  key: SESSION_KEY
            - name: GITHUB_ALLOWED_USERS
              valueFrom:
                secretKeyRef:
                  name: dashboard-backend-secret
                  key: GITHUB_ALLOWED_USERS
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: migrations
              mountPath: /db
      volumes:
        - name: migrations
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-backend
  namespace: chainguard-app
spec:
  selector:
    app: dashboard-backend
  ports:
    - port: 8080
      targetPort: http
  type: ClusterIP
  template:
    spec:
      containers:
        - image: ghcr.io/tripleaze/chainguard-dashboard-backend:main
