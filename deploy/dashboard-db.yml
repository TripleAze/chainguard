apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-db-config
  namespace: chainguard-app
data:
  POSTGRES_DB: chainguard
  POSTGRES_USER: chainguard
---
apiVersion: v1
kind: Secret
metadata:
  name: dashboard-db-secret
  namespace: chainguard-app
type: Opaque
stringData:
  POSTGRES_PASSWORD: "gLTjDbdo5QrgtekfwFpYPgseUYDrCcKnFuPi5oGJ34k="
---
