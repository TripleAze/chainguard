---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dashboard-db
  namespace: chainguard-app
spec:
  selector:
    matchLabels:
      app: dashboard-db
  serviceName: dashboard-db
  replicas: 1
  template:
    metadata:
      labels:
        app: dashboard-db
    spec:
      containers:
      - name: postgres
        image: cgr.dev/chainguard/postgres:latest
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: dashboard-db-config
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: dashboard-db-config
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: dashboard-db-secret
              key: POSTGRES_PASSWORD
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 250m
            memory: 256Mi
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - chainguard
            - -d
            - chainguard
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - chainguard
            - -d
            - chainguard
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: data
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-db
  namespace: chainguard-app
spec:
  selector:
    app: dashboard-db
  ports:
  - port: 5432
    targetPort: postgres
  clusterIP: None
