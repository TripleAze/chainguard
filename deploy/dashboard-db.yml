---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-db-config
  namespace: chainguard-app
data:
  POSTGRES_DB: chainguard
  POSTGRES_USER: chainguard
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dashboard-db
  namespace: chainguard-app
spec:
  serviceName: dashboard-db
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-db
  template:
    metadata:
      labels:
        app: dashboard-db
    spec:
      containers:
      - name: postgres
        image: cgr.dev/chainguard/postgres:latest
        ports:
        - name: postgres
          containerPort: 5432
        env:
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: dashboard-db-config
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: dashboard-db-config
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: dashboard-db-secret
              key: POSTGRES_PASSWORD
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - chainguard
            - -d
            - chainguard
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - chainguard
            - -d
            - chainguard
          initialDelaySeconds: 5
          periodSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-db
  namespace: chainguard-app
spec:
  selector:
    app: dashboard-db
  ports:
  - port: 5432
    targetPort: postgres
  clusterIP: None
