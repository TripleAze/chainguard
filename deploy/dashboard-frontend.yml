apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-frontend-config
  namespace: chainguard-app
data:
  NODE_ENV: "production"
  NEXT_PUBLIC_API_URL: "http://dashboard-backend:8080"
spec:
  template:
    spec:
      containers:
        - image: ghcr.io/tripleaze/chainguard-dashboard-frontend:main
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-frontend
  namespace: chainguard-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dashboard-frontend
  template:
    metadata:
      labels:
        app: dashboard-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/tripleaze/chainguard-dashboard-frontend:main
          command: ["node", "server.js"]
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: dashboard-frontend-config
                  key: NODE_ENV
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: dashboard-frontend-config
                  key: NEXT_PUBLIC_API_URL
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-frontend
  namespace: chainguard-app
spec:
  selector:
    app: dashboard-frontend
  ports:
    - port: 3000
      targetPort: http
  type: ClusterIP
  template:
    spec:
      containers:
        - image: ghcr.io/tripleaze/chainguard-dashboard-frontend:main
