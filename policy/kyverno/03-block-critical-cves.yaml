# policy/kyverno/03-block-critical-cves.yaml
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: block-critical-cves
  annotations:
    policies.kyverno.io/title: Block Critical CVEs
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: critical
    policies.kyverno.io/description: >-
      Verifies a signed Grype vulnerability attestation is present and
      that it contains zero critical severity findings. CVEs documented
      in .grype.yaml are excluded from the attestation by the scanner.
spec:
  validationFailureAction: Enforce
  webhookTimeoutSeconds: 30
  rules:
    - name: verify-vuln-scan
      match:
        any:
          - resources:
              kinds: [Pod]
      verifyImages:
        - imageReferences:
            - "ghcr.io/tripleaze/chainguard*"
          mutateDigest: true
          verifyDigest: true
          required: true
          attestations:
            - type: https://cosign.sigstore.dev/attestation/vuln/v1
              attestors:
                - count: 1
                  entries:
                    - keyless:
                        subject: "https://github.com/TripleAze/chainguard/.github/workflows/ci.yml@refs/heads/main"
                        issuer: "https://token.actions.githubusercontent.com"
                        rekor:
                          url: "https://rekor.sigstore.dev"
              # Inspect the attestation payload — block if any critical CVEs
              conditions:
                - all:
                    - key: "{{ predicate.scanner.result || `[]` | [?vulnerability.severity == 'Critical'] | length(@) }}"
                      operator: Equals
                      value: 0