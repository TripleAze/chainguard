name: Build and Push Dashboard Images

on:
  push:
    branches:
      - main
    paths:
      - "dashboard/backend/**"
      - "dashboard/frontend/**"
      - ".github/workflows/build-dashboard.yml"
  pull_request:
    branches:
      - main
    paths:
      - "dashboard/backend/**"
      - "dashboard/frontend/**"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository }}-dashboard-backend
  IMAGE_NAME_FRONTEND: ${{ github.repository }}-dashboard-frontend

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}

      - name: Extract metadata (tags, labels) for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}

      - name: Build and push backend image
        id: build-backend
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard/backend
          file: ./dashboard/backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        id: build-frontend
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard/frontend
          file: ./dashboard/frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install yq
        if: github.event_name != 'pull_request'
        uses: mikefarah/yq@v4.44.3

      - name: Update Kubernetes manifests
        if: github.event_name != 'pull_request'
        run: |
          # Get the tags from metadata (use first tag as primary)
          BACKEND_TAG=$(echo "${{ steps.meta-backend.outputs.tags }}" | head -n 1)
          FRONTEND_TAG=$(echo "${{ steps.meta-frontend.outputs.tags }}" | head -n 1)

          # Update backend deployment
          yq eval ".spec.template.spec.containers[0].image = \"${BACKEND_TAG}\"" -i deploy/dashboard-backend.yml

          # Update frontend deployment
          yq eval ".spec.template.spec.containers[0].image = \"${FRONTEND_TAG}\"" -i deploy/dashboard-frontend.yml

      - name: Commit and push manifest changes
        if: github.event_name != 'pull_request'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add deploy/dashboard-backend.yml deploy/dashboard-frontend.yml
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No manifest changes to commit"
          else
            git commit -m "chore: update dashboard images to latest tags"
            git push
          fi
