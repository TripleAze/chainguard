name: ChainGuard CI Pipeline

on:
  push:
    branches: [main]
    paths:
      - "razz-bug-calenderapp/**"
      - ".github/workflows/ci.yml"
      - ".grype.yaml"
  pull_request:
    branches: [main]
    paths:
      - "razz-bug-calenderapp/**"
      - ".github/workflows/ci.yml"
      - ".grype.yaml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write      # upgraded from read — needed to commit digest update for ArgoCD
  packages: write
  id-token: write
  attestations: write
  security-events: write

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build & Push
  # Builds the Docker image and pushes to GHCR.
  # We push *before* signing — you sign the digest,
  # not the tag, because tags are mutable.
  # ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      image-ref: ${{ steps.prep.outputs.lowercase_repo }}

    steps:
      - name: Prepare lowercase image ref
        id: prep
        run: |
          IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "lowercase_repo=${IMAGE_REF,,}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.lowercase_repo }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: razz-bug-calenderapp
          file: razz-bug-calenderapp/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ─────────────────────────────────────────────
  # JOB 2: Generate SBOM
  # Syft generates the SBOM from the image digest.
  # Digest-pinned — guarantees we scan exactly what
  # was pushed, not a same-tag-different-image.
  # ─────────────────────────────────────────────
  generate-sbom:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM
        run: |
          syft ${{ needs.build.outputs.image-ref }}@${{ needs.build.outputs.digest }} \
            --output spdx-json=sbom.spdx.json \
            --output table

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 90

  # ─────────────────────────────────────────────
  # JOB 3: Scan SBOM
  # Grype scans the SBOM for CVEs.
  # Gate: fails on unfixed critical CVEs.
  # Documented exceptions live in .grype.yaml.
  # SARIF is uploaded before the gate runs so
  # the Security tab is always populated.
  # ─────────────────────────────────────────────
  scan-sbom:
    needs: generate-sbom
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Update Grype vulnerability database
        run: |
          grype db update
          grype db status

      - name: Generate SARIF report
        run: |
          grype sbom:sbom.spdx.json \
            --config .grype.yaml \
            --output sarif \
            --file results.sarif
        continue-on-error: true  # upload evidence before enforcing gate

      - name: Verify SARIF is valid
        if: always()
        run: |
          if [ ! -s results.sarif ]; then
            echo "SARIF empty — writing minimal valid fallback"
            cat > results.sarif << 'EOF'
          {
            "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
            "version": "2.1.0",
            "runs": [{
              "tool": { "driver": { "name": "Grype", "rules": [] } },
              "results": []
            }]
          }
          EOF
          else
            echo "SARIF present ($(wc -c < results.sarif) bytes)"
            python3 -m json.tool results.sarif > /dev/null && echo "Valid JSON"
          fi

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          category: chainguard-grype

      - name: Enforce CVE gate
        # Runs after SARIF upload — gate blocks pipeline but evidence is already stored
        run: |
          grype sbom:sbom.spdx.json \
            --config .grype.yaml \
            --output table \
            --fail-on critical

  # ─────────────────────────────────────────────
  # JOB 4: Sign, Attest & Push Provenance
  # Only runs if scan passed the CVE gate.
  # Cosign keyless signing via OIDC — no stored keys.
  # Provenance pushed to OCI registry via
  # actions/attest-build-provenance so Kyverno
  # can verify it at admission time.
  # ─────────────────────────────────────────────
  sign-and-attest:
    needs: [build, scan-sbom]
    runs-on: ubuntu-latest

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom

      - name: Sign image digest
        # Signs the digest, not the mutable tag.
        # Stored in registry as: sha256-<digest>.sig
        run: |
          cosign sign --yes \
            ${{ needs.build.outputs.image-ref }}@${{ needs.build.outputs.digest }}

      - name: Attach SBOM as signed attestation
        # Attaches SBOM as a signed in-toto DSSE attestation.
        # Stored in registry as: sha256-<digest>.att
        # Kyverno policy 02-require-sbom-attestation verifies this.
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            ${{ needs.build.outputs.image-ref }}@${{ needs.build.outputs.digest }}
      
      - name: Generate and attach signed vuln attestation
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          # Run Grype with cosign-vuln output format, this produces
          # a JSON payload matching the vuln attestation predicate schema
          grype sbom:sbom.spdx.json \
            --config .grype.yaml \
            --output cosign-vuln \
            --file vuln-attestation.json

          echo "Vuln attestation payload:"
          cat vuln-attestation.json | jq '.predicate.scanner'

          # Sign and attach as a cosign vuln attestation
          cosign attest --yes \
            --predicate vuln-attestation.json \
            --type vuln \
          ${{ needs.build.outputs.image-ref }}@${{ needs.build.outputs.digest }}

      - name: Push provenance attestation to OCI registry
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ needs.build.outputs.image-ref }}
          subject-digest: ${{ needs.build.outputs.digest }}
          push-to-registry: true

  # ─────────────────────────────────────────────
  # JOB 5: SLSA Provenance (external generator)
  # Generates SLSA Level 2 provenance via the
  # official SLSA GitHub generator — runs in an
  # isolated job so the build job cannot tamper
  # with the provenance it describes.
  # ─────────────────────────────────────────────
  provenance:
    needs: [build, sign-and-attest]
    permissions:
      actions: read
      id-token: write
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.0.0
    with:
      image: ${{ needs.build.outputs.image-ref }}
      digest: ${{ needs.build.outputs.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # JOB 6: Update Deployment Manifest
  # Updates the image digest in the Kubernetes
  # deployment manifest so ArgoCD detects the
  # change and reconciles the cluster.
  # Only runs on push to main (not PRs).
  # ─────────────────────────────────────────────
  update-manifest:
    needs: [build, sign-and-attest, provenance]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image digest in deployment manifest
        # Pins the deployment to an exact digest — not a mutable tag.
        # ArgoCD watches this file and syncs when it changes.
        # Using digest (not tag) means ArgoCD deploys exactly what
        # was signed and attested, not whatever :main resolves to.
        run: |
          DIGEST="${{ needs.build.outputs.digest }}"
          IMAGE_REF="${{ needs.build.outputs.image-ref }}"

          sed -i "s|image: ${IMAGE_REF}@sha256:.*|image: ${IMAGE_REF}@${DIGEST}|g" \
            deploy/deployment.yml

          # Verify the substitution worked
          echo "Updated image reference:"
          grep "image:" deploy/deployment.yml

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/deployment.yml
          git diff --staged --quiet || git commit -m "chore: update image to ${{ needs.build.outputs.digest }}"
          git push